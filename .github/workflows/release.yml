name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --target universal-apple-darwin
          - os: windows-latest
            args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Biblioteca ${{ github.ref_name }}'
          releaseBody: |
            ## Instalação

            | Plataforma | Ficheiro |
            |---|---|
            | macOS (M1/M2/Intel — Universal) | `.dmg` |
            | Windows | `.msi` ou `.exe` |

            Faça download do ficheiro correspondente ao seu sistema e siga as instruções de instalação.
            Os dados ficam guardados em `~/Documents/biblioteca.txt` (mesmo formato do programa em C++).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
