name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necessário para git describe encontrar as tags

      - name: Configura Pages
        uses: actions/configure-pages@v5

      - name: Injetar versão no HTML
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          VERSION="${VERSION#v}"
          sed -i \
            -e "s/APP_VERSION = '[^']*'/APP_VERSION = '$VERSION'/" \
            -e "s/>v[0-9][^<]*<\/span>/>v$VERSION<\/span>/" \
            -e "s/v[0-9][0-9.]*<\/title>/v$VERSION<\/title>/" \
            src/index.html

      - name: Copia ícones para o site
        run: cp -r src-tauri/icons src/icons

      - name: Envia artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: src

      - name: Publica no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
